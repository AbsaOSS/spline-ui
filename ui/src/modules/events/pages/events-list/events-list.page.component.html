<div class="container" *ngIf="state$ | async as state">

    <h1 class="page-title">
        {{'EVENTS.EVENTS_LIST_PAGE__TITLE' | translate}}
    </h1>

    <spline-search-dynamic-table [showPaginator]="true"
                                 [dataMap]="dataMap"
                                 [dataSource]="dataSource">

        <div class="d-flex">

            <spline-date-filter *ngIf="!!state.dateRangeFilter?.bounds"
                                label="Executed At"
                                [showIcon]="false"
                                [maxDate]="state.dateRangeFilter.bounds?.dateTo"
                                [minDate]="state.dateRangeFilter.bounds?.dateFrom"
                                [value]="state.dateRangeFilter?.value"
                                (valueChanged$)="onDateFilterChanged($event)">

            </spline-date-filter>

            <spline-inline-filter-with-overlay
                    label="Write Mode"
                    [icon]="'save'"
                    [filterStringValues]="writeMode.length === 0 ? 'All' : writeMode.join(', ') ">

                <spline-list-box [splineListBoxRecords]="listBoxRecords"
                                 [ngModel]="writeMode"
                                 ngDefaultControl
                                 (ngModelChange)="onWriteModeChanged($event)"
                                 [dataMap]="listBoxDataMap">
                </spline-list-box>

            </spline-inline-filter-with-overlay>

            <dynamic-filter-container [model]="filterModel"></dynamic-filter-container>

        </div>

    </spline-search-dynamic-table>
</div>
