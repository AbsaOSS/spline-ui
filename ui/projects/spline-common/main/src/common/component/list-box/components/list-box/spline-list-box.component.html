<div class="spline-list-box">

<!--    <div class="spline-list-box__search">-->
<!--        <spline-search-box [searchTerm]="searchTerm"-->
<!--                           (search$)="onSearchTermChanged($event)">-->
<!--        </spline-search-box>-->
<!--    </div>-->

    <div class="spline-list-box__header">

    </div>

    <div class="spline-list-box__content">
        <div class="spline-list-box__record">
        </div>

        <mat-selection-list class="spline-list-box__selection-list"
                            [multiple]="multiple"
                            [compareWith]="compareFn"
                            [(ngModel)]="_value"
                            (ngModelChange)="onNgModelChange($event)">

            <mat-list-option *ngFor="let option of _selectionListOptions; trackBy: trackByFn"
                             checkboxPosition="before"
                             [value]="option.value">

                {{ option.label }}

            </mat-list-option>
        </mat-selection-list>
    </div>

    <div class="spline-list-box__footer">

    </div>
</div>


<ng-template #defaultRecordTemplate>

</ng-template>
